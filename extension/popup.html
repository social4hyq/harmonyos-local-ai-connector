<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    width: 280px;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    color: #333;
    margin: 0;
  }
  h1 {
    font-size: 15px;
    margin: 0 0 12px 0;
    color: #1a1a1a;
  }
  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    padding: 8px 10px;
    border-radius: 6px;
    background: #f5f5f5;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot.connected { background: #34c759; }
  .dot.disconnected { background: #ff3b30; }
  .dot.reconnecting { background: #ff9500; animation: pulse 1s infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .info {
    margin-bottom: 6px;
    color: #666;
  }
  .info span {
    color: #333;
    font-family: monospace;
    font-size: 12px;
  }
</style>
</head>
<body>
  <h1>Local Model Connector</h1>
  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span id="status-text">检测中...</span>
  </div>
  <div class="info">代理服务器: <span>localhost:11435</span></div>
  <div class="info">模型管家: <span>localhost:11434</span></div>
  <div class="info">已转发请求: <span id="count">0</span></div>
  <script src="popup.js"></script>
</body>
</html>
